<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>글밭</title>
    <!--
      P7 font loading (§3.5.4 / §10.25):
      - Newsreader / Inter / JetBrains Mono + Noto Serif KR: Google Fonts CDN fallback
      - Pretendard: jsDelivr (Google Fonts 미수록)
      - display=swap: FOIT 회피
      self-hosted bundling 우선 전환은 후속 작업 (§10.25 #1).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Noto+Serif+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
